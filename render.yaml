services:
  # Backend Web Service
  - type: web
    name: vedha-school-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vedha-school-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: ENVIRONMENT
        value: production

  # Frontend Static Site
  - type: web
    name: vedha-school-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=0, no-cache, no-store, must-revalidate
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vedha-school-backend
          property: host

databases:
  - name: vedha-school-db
    plan: free
    databaseName: school_erp
    user: school_admin
